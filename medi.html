<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>VaithyaVani | AI-Powered Health Management</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .app-container {
      max-width: 1400px;
      width: 100%;
      background: white;
      border-radius: 1.5rem;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 95vh;
    }

    .app-header {
      background: linear-gradient(135deg, #059669 0%, #047857 100%);
      color: white;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      border-bottom: 2px solid rgba(255,255,255,0.1);
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-icon {
      font-size: 2rem;
      color: #fbbf24;
    }

    .logo-text {
      font-size: 1.75rem;
      font-weight: 700;
    }
    .logo-text span {
      font-weight: 300;
      color: #d1fae5;
    }

    .ai-badge {
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      padding: 0.25rem 0.75rem;
      border-radius: 2rem;
      font-size: 0.75rem;
      font-weight: 600;
      margin-left: 0.5rem;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .user-badge {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      padding: 0.5rem 1.2rem;
      border-radius: 2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 500;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .settings-btn {
      background: rgba(255,255,255,0.2);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .settings-btn:hover {
      background: rgba(255,255,255,0.3);
    }

    .nav-tabs {
      display: flex;
      background: #f0fdf4;
      padding: 0.5rem 1.5rem;
      gap: 0.5rem;
      border-bottom: 2px solid #d1fae5;
      overflow-x: auto;
    }

    .tab {
      padding: 0.7rem 1.5rem;
      border-radius: 2rem;
      background: transparent;
      border: none;
      font-weight: 600;
      color: #374151;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      white-space: nowrap;
      transition: all 0.3s;
      font-size: 0.9rem;
    }

    .tab:hover {
      background: #d1fae5;
    }

    .tab.active {
      background: #059669;
      color: white;
      box-shadow: 0 4px 12px rgba(5, 150, 105, 0.3);
    }

    .tab.ai-tab {
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      color: white;
      opacity: 0.9;
    }

    .tab.ai-tab.active {
      opacity: 1;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
    }

    .dashboard {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
    }

    .dashboard::-webkit-scrollbar {
      width: 8px;
    }

    .dashboard::-webkit-scrollbar-thumb {
      background: #d1fae5;
      border-radius: 10px;
    }

    .cards-grid {
      flex: 2;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
    }

    .stat-card {
      background: white;
      border-radius: 1rem;
      padding: 1.5rem;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      border: 1px solid #e5e7eb;
      transition: all 0.3s;
    }

    .stat-card:hover {
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      transform: translateY(-2px);
    }

    .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
    }

    .stat-icon.green {
      background: #d1fae5;
      color: #059669;
    }

    .stat-icon.purple {
      background: #ede9fe;
      color: #7c3aed;
    }

    .stat-icon.blue {
      background: #dbeafe;
      color: #2563eb;
    }

    .stat-info h4 {
      font-size: 0.85rem;
      color: #6b7280;
      font-weight: 500;
      margin-bottom: 0.25rem;
    }

    .stat-info p {
      font-size: 1.75rem;
      font-weight: 700;
      color: #111827;
    }

    .card {
      background: white;
      border-radius: 1rem;
      padding: 1.5rem;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      border: 1px solid #e5e7eb;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 2px solid #f3f4f6;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #111827;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .doctor-item, .appointment-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem;
      border-radius: 0.75rem;
      margin-bottom: 0.5rem;
      background: #f9fafb;
      transition: all 0.2s;
    }

    .doctor-item:hover, .appointment-item:hover {
      background: #f0fdf4;
    }

    .doctor-info {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .doctor-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #d1fae5;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #059669;
      font-weight: bold;
    }

    .btn {
      padding: 0.5rem 1.2rem;
      border-radius: 2rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.3s;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: #059669;
      color: white;
    }

    .btn-primary:hover {
      background: #047857;
      box-shadow: 0 4px 12px rgba(5, 150, 105, 0.3);
    }

    .btn-ai {
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      color: white;
    }

    .btn-ai:hover {
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
      transform: translateY(-1px);
    }

    .btn-outline {
      background: white;
      color: #059669;
      border: 2px solid #059669;
    }

    .btn-outline:hover {
      background: #f0fdf4;
    }

    .badge {
      padding: 0.25rem 0.75rem;
      border-radius: 2rem;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge-success {
      background: #d1fae5;
      color: #065f46;
    }

    .badge-warning {
      background: #fef3c7;
      color: #92400e;
    }

    .badge-purple {
      background: #ede9fe;
      color: #5b21b6;
    }

    .admin-panel {
      flex: 1;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .api-config {
      background: linear-gradient(135deg, #faf5ff, #f0fdf4);
      border: 2px solid #c4b5fd;
      border-radius: 1rem;
      padding: 1.5rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-label {
      display: block;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }

    .form-input, .form-select {
      width: 100%;
      padding: 0.75rem;
      border: 2px solid #e5e7eb;
      border-radius: 0.75rem;
      font-size: 0.9rem;
      transition: all 0.3s;
      background: white;
    }

    .form-input:focus, .form-select:focus {
      outline: none;
      border-color: #8b5cf6;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
    }

    textarea {
      width: 100%;
      padding: 0.75rem;
      border: 2px solid #e5e7eb;
      border-radius: 0.75rem;
      font-size: 0.9rem;
      resize: vertical;
      min-height: 100px;
      font-family: inherit;
    }

    textarea:focus {
      outline: none;
      border-color: #8b5cf6;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
    }

    .ai-response {
      background: white;
      border-radius: 0.75rem;
      padding: 1rem;
      margin-top: 1rem;
      border: 1px solid #e5e7eb;
      max-height: 400px;
      overflow-y: auto;
      line-height: 1.6;
    }

    .loading {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: #7c3aed;
      padding: 1rem;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid #e5e7eb;
      border-top: 3px solid #7c3aed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: #111827;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 2rem;
      font-size: 0.9rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      z-index: 1000;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(5px);
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 1.5rem;
      padding: 2rem;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    }

    @media (max-width: 768px) {
      .dashboard {
        flex-direction: column;
        padding: 1rem;
      }
      .stats-row {
        grid-template-columns: 1fr;
      }
      .app-header {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>
<div class="app-container">
  <header class="app-header">
    <div class="logo-area">
      <i class="fas fa-om logo-icon"></i>
      <div class="logo-text">Vaithya<span>Vani</span></div>
      <span class="ai-badge"><i class="fas fa-robot"></i> AI</span>
    </div>
    <div class="header-actions">
      <div class="user-badge">
        <i class="fas fa-user-circle"></i> Ravi Kumar
      </div>
      <button class="settings-btn" onclick="openSettings()">
        <i class="fas fa-cog"></i> AI Settings
      </button>
    </div>
  </header>

  <nav class="nav-tabs">
    <button class="tab active" onclick="switchTab('dashboard')">
      <i class="fas fa-th-large"></i> Dashboard
    </button>
    <button class="tab" onclick="switchTab('appointments')">
      <i class="fas fa-calendar-check"></i> Appointments
    </button>
    <button class="tab" onclick="switchTab('records')">
      <i class="fas fa-folder-medical"></i> Health Records
    </button>
    <button class="tab ai-tab" onclick="switchTab('ai-analysis')">
      <i class="fas fa-brain"></i> AI Analysis
    </button>
  </nav>

  <div class="dashboard" id="dashboardContent"></div>
</div>

<!-- AI Settings Modal -->
<div class="modal" id="settingsModal">
  <div class="modal-content">
    <h3 style="margin-bottom: 1.5rem; color: #111827;">
      <i class="fas fa-robot" style="color: #7c3aed;"></i> AI Configuration
    </h3>
    
    <div class="form-group">
      <label class="form-label">OpenRouter API Key</label>
      <input type="password" class="form-input" id="apiKeyInput" 
             placeholder="sk-or-v1-..." autocomplete="off">
      <small style="color: #6b7280; display: block; margin-top: 0.25rem;">
        Get your key at <a href="https://openrouter.ai/keys" target="_blank" style="color: #7c3aed;">openrouter.ai/keys</a>
      </small>
    </div>

    <div class="form-group">
      <label class="form-label">AI Model</label>
      <select class="form-select" id="modelSelect">
        <optgroup label="Google">
          <option value="google/gemini-2.0-flash-001">Gemini 2.0 Flash (Fast)</option>
          <option value="google/gemini-pro">Gemini Pro (Powerful)</option>
        </optgroup>
        <optgroup label="Anthropic">
          <option value="anthropic/claude-3-haiku">Claude 3 Haiku (Fast)</option>
          <option value="anthropic/claude-3-sonnet">Claude 3 Sonnet (Balanced)</option>
        </optgroup>
        <optgroup label="OpenAI">
          <option value="openai/gpt-3.5-turbo">GPT-3.5 Turbo (Fast)</option>
          <option value="openai/gpt-4o-mini">GPT-4o Mini (Efficient)</option>
        </optgroup>
        <optgroup label="Meta">
          <option value="meta-llama/llama-3-70b-instruct">Llama 3 70B (Powerful)</option>
        </optgroup>
      </select>
    </div>

    <div style="display: flex; gap: 0.75rem; margin-top: 1.5rem;">
      <button class="btn btn-primary" onclick="saveSettings()" style="flex: 1;">
        <i class="fas fa-save"></i> Save Settings
      </button>
      <button class="btn btn-outline" onclick="closeSettings()" style="flex: 1;">
        Cancel
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <i class="fas fa-check-circle"></i>
  <span id="toastText"></span>
</div>

<script>
  // State Management
  const state = {
    apiKey: localStorage.getItem('vaithyavani_api_key') || '',
    model: localStorage.getItem('vaithyavani_model') || 'google/gemini-2.0-flash-001',
    currentTab: 'dashboard',
    healthData: {
      age: 35,
      bloodGroup: 'O+',
      lastCheckup: '2026-04-15',
      conditions: ['Hypertension', 'Vitamin D deficiency'],
      medications: ['Amlodipine 5mg', 'Vitamin D3 2000IU']
    },
    doctors: [
      { id: 1, name: 'Dr. Anjali Sharma', specialty: 'Cardiologist', available: true },
      { id: 2, name: 'Dr. Rajesh Mehta', specialty: 'Dermatologist', available: true },
      { id: 3, name: 'Dr. Sneha Iyer', specialty: 'Pediatrician', available: false }
    ],
    appointments: [
      { id: 101, doctor: 'Dr. Anjali Sharma', date: '2026-05-02', time: '10:30 AM', status: 'Confirmed' },
      { id: 102, doctor: 'Dr. Rajesh Mehta', date: '2026-05-05', time: '2:00 PM', status: 'Pending' }
    ],
    healthRecords: [
      { id: 201, title: 'Blood Test Report', date: '2026-04-10', type: 'Lab', data: 'Hemoglobin: 14.2 g/dL\nWBC: 7800/μL\nPlatelets: 250000/μL\nBlood Sugar (Fasting): 95 mg/dL' },
      { id: 202, title: 'Prescription - Dr. Sharma', date: '2026-04-22', type: 'Prescription', data: 'Amlodipine 5mg once daily\nVitamin D3 2000IU weekly\nFollow-up in 3 months' }
    ]
  };

  // Toast Notification
  function showToast(message, icon = 'fa-check-circle') {
    const toast = document.getElementById('toast');
    document.getElementById('toastText').textContent = message;
    toast.querySelector('i').className = `fas ${icon}`;
    toast.style.display = 'flex';
    setTimeout(() => toast.style.display = 'none', 3000);
  }

  // Settings Modal
  function openSettings() {
    document.getElementById('apiKeyInput').value = state.apiKey;
    document.getElementById('modelSelect').value = state.model;
    document.getElementById('settingsModal').classList.add('active');
  }

  function closeSettings() {
    document.getElementById('settingsModal').classList.remove('active');
  }

  function saveSettings() {
    const apiKey = document.getElementById('apiKeyInput').value.trim();
    const model = document.getElementById('modelSelect').value;
    
    if (!apiKey) {
      showToast('Please enter your OpenRouter API key', 'fa-exclamation-circle');
      return;
    }
    
    state.apiKey = apiKey;
    state.model = model;
    localStorage.setItem('vaithyavani_api_key', apiKey);
    localStorage.setItem('vaithyavani_model', model);
    
    closeSettings();
    showToast('AI settings saved successfully!', 'fa-check-circle');
  }

  // OpenRouter API Call
  async function callAI(prompt, systemMessage = "You are a healthcare AI assistant for VaithyaVani. Provide accurate, helpful medical insights.") {
    if (!state.apiKey) {
      showToast('Please configure your OpenRouter API key in Settings', 'fa-key');
      openSettings();
      return null;
    }

    try {
      const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${state.apiKey}`,
          "HTTP-Referer": window.location.href,
          "X-Title": "VaithyaVani Health App",
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model: state.model,
          messages: [
            { role: "system", content: systemMessage },
            { role: "user", content: prompt }
          ],
          temperature: 0.7,
          max_tokens: 1000
        })
      });

      if (!response.ok) {
        const errorData = await response.json().catch(() => ({}));
        throw new Error(errorData.error?.message || `HTTP ${response.status}: Request failed`);
      }

      const data = await response.json();
      return data.choices[0].message.content;
    } catch (error) {
      console.error('AI API Error:', error);
      showToast(`AI Error: ${error.message}`, 'fa-exclamation-triangle');
      return null;
    }
  }

  // AI Functions
  async function analyzeSymptoms(symptoms) {
    const prompt = `Patient Profile:
- Age: ${state.healthData.age}
- Blood Group: ${state.healthData.bloodGroup}
- Conditions: ${state.healthData.conditions.join(', ')}
- Medications: ${state.healthData.medications.join(', ')}

Symptoms: ${symptoms}

Provide analysis with:
1. Possible conditions (common to less common)
2. Recommended immediate actions
3. When to see a doctor
4. Lifestyle modifications
5. Warning signs to watch for

IMPORTANT: Include a disclaimer that this is AI-generated information and not medical diagnosis.`;

    return await callAI(prompt, "You are a clinical decision support AI. Be thorough but emphasize consulting healthcare providers.");
  }

  async function analyzeReport(reportData) {
    const prompt = `Explain this medical report in simple language:
${reportData}

Include:
1. Key findings in plain English
2. What the values mean
3. Any areas needing attention
4. Questions to ask the doctor
5. Follow-up recommendations`;

    return await callAI(prompt, "You are a medical report interpreter. Use simple language but be accurate.");
  }

  async function getHealthInsights() {
    const prompt = `Patient: ${state.healthData.age} years, Blood ${state.healthData.bloodGroup}
Conditions: ${state.healthData.conditions.join(', ')}
Medications: ${state.healthData.medications.join(', ')}

Recent Records:
${state.healthRecords.map(r => `${r.title}: ${r.data}`).join('\n')}

Provide:
1. Health assessment
2. Risk factors
3. Preventive care tips
4. Medication guidance
5. Lifestyle optimization
6. Recommended screenings`;

    return await callAI(prompt, "You are a preventive healthcare AI. Be practical and evidence-based.");
  }

  // Render Functions
  function renderDashboard() {
    const html = `
      <div class="cards-grid">
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-icon green"><i class="fas fa-calendar-check"></i></div>
            <div class="stat-info">
              <h4>Appointments</h4>
              <p>${state.appointments.length}</p>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon blue"><i class="fas fa-file-medical"></i></div>
            <div class="stat-info">
              <h4>Health Records</h4>
              <p>${state.healthRecords.length}</p>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon purple"><i class="fas fa-robot"></i></div>
            <div class="stat-info">
              <h4>AI Model</h4>
              <p style="font-size: 0.9rem;">${state.model.split('/').pop()}</p>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <div class="card-title"><i class="fas fa-clock"></i> Upcoming Appointments</div>
            <button class="btn btn-primary" onclick="bookAppointment()">
              <i class="fas fa-plus"></i> Book New
            </button>
          </div>
          ${state.appointments.map(app => `
            <div class="appointment-item">
              <div class="doctor-info">
                <div class="doctor-avatar"><i class="fas fa-user-md"></i></div>
                <div>
                  <strong>${app.doctor}</strong><br>
                  <small style="color: #6b7280;">${app.date} at ${app.time}</small>
                </div>
              </div>
              <span class="badge ${app.status === 'Confirmed' ? 'badge-success' : 'badge-warning'}">${app.status}</span>
            </div>
          `).join('')}
        </div>

        <div class="card">
          <div class="card-header">
            <div class="card-title"><i class="fas fa-brain"></i> AI Health Assistant</div>
          </div>
          <p style="color: #6b7280; margin-bottom: 1rem;">Get personalized AI-powered health insights</p>
          <button class="btn btn-ai" onclick="generateInsights()">
            <i class="fas fa-magic"></i> Generate Health Insights
          </button>
          <div id="dashboardInsights"></div>
        </div>
      </div>

      <div class="admin-panel">
        <div class="card">
          <div class="card-header">
            <div class="card-title"><i class="fas fa-user-md"></i> Available Doctors</div>
          </div>
          ${state.doctors.map(doc => `
            <div class="doctor-item">
              <div class="doctor-info">
                <div class="doctor-avatar"><i class="fas fa-user-md"></i></div>
                <div>
                  <strong>${doc.name}</strong><br>
                  <small style="color: #6b7280;">${doc.specialty}</small>
                </div>
              </div>
              <button class="btn ${doc.available ? 'btn-primary' : 'btn-outline'}" 
                      ${!doc.available ? 'disabled' : ''}
                      onclick="quickBook(${doc.id})">
                ${doc.available ? 'Book' : 'Unavailable'}
              </button>
            </div>
          `).join('')}
        </div>

        <div class="api-config">
          <h4 style="margin-bottom: 1rem; color: #374151;">
            <i class="fas fa-cog"></i> AI Configuration
          </h4>
          ${state.apiKey ? `
            <p style="color: #059669; margin-bottom: 0.5rem;">
              <i class="fas fa-check-circle"></i> API Key configured
            </p>
            <p style="font-size: 0.85rem; color: #6b7280;">Model: ${state.model}</p>
          ` : `
            <p style="color: #ef4444; margin-bottom: 0.5rem;">
              <i class="fas fa-exclamation-circle"></i> API Key not set
            </p>
          `}
          <button class="btn btn-outline" onclick="openSettings()" style="width: 100%; margin-top: 0.5rem;">
            <i class="fas fa-key"></i> Configure AI
          </button>
        </div>
      </div>
    `;
    document.getElementById('dashboardContent').innerHTML = html;
  }

  function renderAppointments() {
    const html = `
      <div style="width: 100%;">
        <div class="card">
          <div class="card-header">
            <div class="card-title"><i class="fas fa-calendar-alt"></i> All Appointments</div>
            <button class="btn btn-primary" onclick="bookAppointment()">
              <i class="fas fa-plus"></i> Book New
            </button>
          </div>
          ${state.appointments.length ? state.appointments.map(app => `
            <div class="appointment-item">
              <div class="doctor-info">
                <div class="doctor-avatar"><i class="fas fa-user-md"></i></div>
                <div>
                  <strong>${app.doctor}</strong><br>
                  <small>${app.date} at ${app.time}</small>
                </div>
              </div>
              <span class="badge ${app.status === 'Confirmed' ? 'badge-success' : 'badge-warning'}">${app.status}</span>
            </div>
          `).join('') : '<p style="color: #6b7280; padding: 1rem;">No appointments scheduled</p>'}
        </div>
      </div>
    `;
    document.getElementById('dashboardContent').innerHTML = html;
  }

  function renderRecords() {
    const html = `
      <div style="width: 100%;">
        <div class="card">
          <div class="card-header">
            <div class="card-title"><i class="fas fa-folder-open"></i> Health Records</div>
            <button class="btn btn-primary" onclick="addRecord()">
              <i class="fas fa-plus"></i> Add Record
            </button>
          </div>
          ${state.healthRecords.map(rec => `
            <div style="background: #f9fafb; padding: 1rem; border-radius: 0.75rem; margin-bottom: 0.75rem;">
              <div style="display: flex; justify-content: space-between; align-items: start;">
                <div>
                  <strong style="color: #111827;">${rec.title}</strong><br>
                  <small style="color: #6b7280;">${rec.date} • ${rec.type}</small>
                </div>
                <span class="badge badge-purple">${rec.type}</span>
              </div>
              <pre style="margin-top: 0.5rem; color: #374151; font-family: inherit; white-space: pre-wrap;">${rec.data}</pre>
            </div>
          `).join('')}
        </div>
      </div>
    `;
    document.getElementById('dashboardContent').innerHTML = html;
  }

  function renderAIAnalysis() {
    const html = `
      <div style="width: 100%;">
        <div class="card" style="margin-bottom: 1.5rem;">
          <div class="card-header">
            <div class="card-title"><i class="fas fa-stethoscope"></i> Symptom Checker</div>
          </div>
          <textarea id="symptomInput" placeholder="Describe your symptoms in detail...&#10;&#10;Example: I've had a headache for 3 days, mild fever (100°F), and feeling very tired. No other medications."></textarea>
          <button class="btn btn-ai" onclick="checkSymptoms()" style="margin-top: 0.75rem;">
            <i class="fas fa-search"></i> Analyze Symptoms
          </button>
          <div id="symptomResult"></div>
        </div>

        <div class="card" style="margin-bottom: 1.5rem;">
          <div class="card-header">
            <div class="card-title"><i class="fas fa-flask"></i> Medical Report Analyzer</div>
          </div>
          <textarea id="reportInput" placeholder="Paste your lab results or medical report...&#10;&#10;Example:&#10;Hemoglobin: 12.5 g/dL&#10;WBC: 11000/μL&#10;Blood Sugar: 140 mg/dL"></textarea>
          <button class="btn btn-ai" onclick="analyzeReportData()" style="margin-top: 0.75rem;">
            <i class="fas fa-microscope"></i> Analyze Report
          </button>
          <div id="reportResult"></div>
        </div>

        <div class="card">
          <div class="card-header">
            <div class="card-title"><i class="fas fa-heart"></i> Comprehensive Health Insights</div>
          </div>
          <p style="color: #6b7280; margin-bottom: 1rem;">Get full health analysis based on your medical profile</p>
          <button class="btn btn-ai" onclick="getFullInsights()">
            <i class="fas fa-chart-line"></i> Generate Full Report
          </button>
          <div id="insightsResult"></div>
        </div>
      </div>
    `;
    document.getElementById('dashboardContent').innerHTML = html;
  }

  // Action Functions
  function switchTab(tab) {
    state.currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.closest('.tab').classList.add('active');
    
    switch(tab) {
      case 'dashboard': renderDashboard(); break;
      case 'appointments': renderAppointments(); break;
      case 'records': renderRecords(); break;
      case 'ai-analysis': renderAIAnalysis(); break;
    }
  }

  function bookAppointment() {
    const doctor = state.doctors.find(d => d.available);
    if (!doctor) {
      showToast('No doctors available', 'fa-exclamation-circle');
      return;
    }
    state.appointments.push({
      id: Date.now(),
      doctor: doctor.name,
      date: new Date().toISOString().split('T')[0],
      time: '11:00 AM',
      status: 'Confirmed'
    });
    showToast(`Booked with ${doctor.name}`);
    switchTab(state.currentTab);
  }

  function quickBook(doctorId) {
    const doctor = state.doctors.find(d => d.id === doctorId);
    if (!doctor?.available) return;
    state.appointments.push({
      id: Date.now(),
      doctor: doctor.name,
      date: new Date().toISOString().split('T')[0],
      time: '10:00 AM',
      status: 'Confirmed'
    });
    showToast(`Booked with ${doctor.name}`);
    renderDashboard();
  }

  function addRecord() {
    state.healthRecords.push({
      id: Date.now(),
      title: 'General Checkup',
      date: new Date().toISOString().split('T')[0],
      type: 'Report',
      data: 'BP: 120/80\nPulse: 72 bpm\nWeight: 70 kg'
    });
    showToast('Health record added');
    renderRecords();
  }

  async function generateInsights() {
    const container = document.getElementById('dashboardInsights');
    container.innerHTML = '<div class="loading"><div class="spinner"></div> Analyzing your health profile...</div>';
    
    const result = await getHealthInsights();
    container.innerHTML = result ? 
      `<div class="ai-response">${result.replace(/\n/g, '<br>')}</div>` :
      '<p style="color: #ef4444; margin-top: 0.5rem;">Failed to generate insights. Check your API key.</p>';
  }

  async function checkSymptoms() {
    const symptoms = document.getElementById('symptomInput')?.value.trim();
    if (!symptoms) {
      showToast('Please describe your symptoms', 'fa-exclamation-circle');
      return;
    }
    
    const container = document.getElementById('symptomResult');
    container.innerHTML = '<div class="loading"><div class="spinner"></div> Analyzing symptoms...</div>';
    
    const result = await analyzeSymptoms(symptoms);
    container.innerHTML = result ? 
      `<div class="ai-response">${result.replace(/\n/g, '<br>')}</div>` :
      '<p style="color: #ef4444; margin-top: 0.5rem;">Analysis failed. Please check API settings.</p>';
  }

  async function analyzeReportData() {
    const report = document.getElementById('reportInput')?.value.trim();
    if (!report) {
      showToast('Please paste report data', 'fa-exclamation-circle');
      return;
    }
    
    const container = document.getElementById('reportResult');
    container.innerHTML = '<div class="loading"><div class="spinner"></div> Interpreting report...</div>';
    
    const result = await analyzeReport(report);
    container.innerHTML = result ? 
      `<div class="ai-response">${result.replace(/\n/g, '<br>')}</div>` :
      '<p style="color: #ef4444; margin-top: 0.5rem;">Analysis failed. Please check API settings.</p>';
  }

  async function getFullInsights() {
    const container = document.getElementById('insightsResult');
    container.innerHTML = '<div class="loading"><div class="spinner"></div> Generating comprehensive report...</div>';
    
    const result = await getHealthInsights();
    container.innerHTML = result ? 
      `<div class="ai-response">${result.replace(/\n/g, '<br>')}</div>` :
      '<p style="color: #ef4444; margin-top: 0.5rem;">Failed to generate report. Check API settings.</p>';
  }

  // Initialize
  document.addEventListener('DOMContentLoaded', () => {
    renderDashboard();
  });
</script>
</body>
</html>
